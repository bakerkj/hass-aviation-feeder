name: renovate-validate

on:
  pull_request:
    paths:
      - renovate.json
      - .github/workflows/**

permissions:
  contents: read

jobs:
  validate:
    name: Validate Renovate config
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key:
            renovate-${{ hashFiles('.github/workflows/renovate-validate.yml') }}

      - name: Schema validation
        run:
          npx --package renovate@43.265.5 -- renovate-config-validator
          renovate.json

      - name: Dry-run lookup test
        env:
          LOG_LEVEL: debug
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The dry-run runs vanilla ``npx renovate`` on a GH Actions
          # runner, without the Host Rules that our production Renovate
          # sees. Inject the bearer for the helper host via
          # RENOVATE_HOST_RULES from the ``APT_HELPER_TOKEN`` repo
          # secret (``GITHUB_`` prefix is reserved by GH Actions).
          RENOVATE_HOST_RULES: >-
            [{"matchHost":"github-apt-helper.keneli.org","token":"${{
            secrets.APT_HELPER_TOKEN }}"}]
        run: |
          npx --package renovate@43.265.5 -- renovate --dry-run --platform=local > renovate-dry-run.log 2>&1 || true

          # 1. Total-failure check: bail on any datasource lookup that
          # errored out. Catches auth failures, TLS errors, generic 5xx.
          errors=$(grep -i "no-result\|failed to look up" renovate-dry-run.log | grep -v "python-version" || true)
          if [ -n "$errors" ]; then
            echo "::error::Renovate datasource lookup failures detected:"
            echo "$errors"
            exit 1
          fi

          # 2. Silent-fallback check. python3-requests is pinned to a
          # trixie-security build (aviation_feeder/Dockerfile). If the
          # matchDatasources:[deb] packageRule with the helper URLs ever
          # stops applying (a typo, precedence conflict, auth failure, or
          # helper-service outage), Renovate falls back to deb.debian.org
          # main-only. That fetch still succeeds -- it just never returns
          # a +deb13uN release, so the check above stays green while the
          # regression this workaround exists to prevent silently returns.
          # Guard against that by requiring evidence that the helper host
          # was actually reached during the dry-run.
          if ! grep -qE "github-apt-helper\.keneli\.org" renovate-dry-run.log; then
            echo "::error::Renovate never contacted github-apt-helper.keneli.org during the dry-run. The matchDatasources:[deb] packageRule may not be applying, or auth to the helper failed. Last 30 lines of Renovate's log:"
            tail -30 renovate-dry-run.log
            exit 1
          fi

          echo "All datasource lookups succeeded (and the helper host was queried)"
