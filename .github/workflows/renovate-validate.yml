name: renovate-validate

on:
  pull_request:
    paths:
      - renovate.json
      - .github/workflows/**

permissions:
  contents: read

jobs:
  validate:
    name: Validate Renovate config
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key:
            renovate-${{ hashFiles('.github/workflows/renovate-validate.yml') }}

      - name: Schema validation
        run:
          npx --package renovate@43.265.5 -- renovate-config-validator
          renovate.json

      - name: Dry-run lookup test
        env:
          # Trace level (not debug) is required so Renovate's HTTP client
          # emits the outgoing request URLs. Debug-level logging only
          # records error/skip cases, so a successful helper query would
          # be invisible to grep. Renovate's getEnv() looks up
          # RENOVATE_LOG_LEVEL first, then LOG_LEVEL -- use the prefixed
          # form so unrelated LOG_LEVEL settings in a broader scope
          # cannot silently downgrade this.
          RENOVATE_LOG_LEVEL: trace
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The dry-run runs vanilla ``npx renovate`` on a GH Actions
          # runner, without the Host Rules that our production Renovate
          # sees. Inject the bearer for the helper host via
          # RENOVATE_HOST_RULES from the ``APT_HELPER_TOKEN`` repo
          # secret (``GITHUB_`` prefix is reserved by GH Actions).
          RENOVATE_HOST_RULES: >-
            [{"matchHost":"github-apt-helper.keneli.org","token":"${{
            secrets.APT_HELPER_TOKEN }}"}]
        run: |
          npx --package renovate@43.265.5 -- renovate --dry-run --platform=local > renovate-dry-run.log 2>&1 || true

          # 1. Total-failure check: bail on any datasource lookup that
          # errored out. Catches auth failures, TLS errors, generic 5xx.
          errors=$(grep -i "no-result\|failed to look up" renovate-dry-run.log | grep -v "python-version" || true)
          if [ -n "$errors" ]; then
            echo "::error::Renovate datasource lookup failures detected:"
            echo "$errors"
            exit 1
          fi

          # 2. Positive assertion: prove that the *deb datasource* itself
          # queried the helper for a trixie sub-suite. Renovate's HttpBase
          # logs "HTTP request: GET <url>" at trace level for every
          # outbound request (lib/util/http/http.ts, `logger.trace`).
          # Anchoring on the `/debian?suite=trixie-` query-string prefix
          # (not just the hostname) means the assertion can only pass if
          # the deb datasource walked componentUrls -- an unrelated auth
          # probe or cache metadata GET to the helper root would not
          # match.
          if ! grep -qE "HTTP request:\s+GET\s+https?://github-apt-helper\.keneli\.org/debian\?suite=trixie-" renovate-dry-run.log; then
            echo "::error::Renovate never made a deb-datasource HTTP request to github-apt-helper.keneli.org for a trixie sub-suite. The matchDatasources:[deb] packageRule is likely not applying (typo, precedence conflict, or the helper URL is filtered out somewhere). Last 50 lines of Renovate's log:"
            tail -50 renovate-dry-run.log
            exit 1
          fi

          # 3. Rule out silent per-URL failures. The `deb` datasource's
          # registryStrategy: 'merge' tolerates partial URL failures --
          # if the helper 401s or 5xxs, that component gets skipped and
          # Renovate carries on with whatever succeeded (i.e. main only).
          # The datasource logs those skips at debug level as
          # "Skipping component due to an error" with the componentUrl
          # (lib/modules/datasource/deb/index.ts).
          skipped=$(grep -E "Skipping component due to an error.*github-apt-helper" renovate-dry-run.log || true)
          if [ -n "$skipped" ]; then
            echo "::error::Renovate reached the helper but the response was rejected (auth failure, 5xx, TLS, or similar). Skipped component lines:"
            echo "$skipped"
            exit 1
          fi

          echo "All datasource lookups succeeded, helper was queried, no components were skipped"

      - name: Upload dry-run log for debugging
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renovate-dry-run-log
          path: renovate-dry-run.log
          retention-days: 7
