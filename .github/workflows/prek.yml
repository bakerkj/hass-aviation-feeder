name: prek

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5
        with:
          extra-args: --all-files
        env:
          # mypy runs via `uv run mypy`, but this job has no uv/dev-deps set up;
          # it is enforced in the tests.yaml "Unit tests" job instead (which does).
          # addon-lint has its own dedicated job (addon-lint.yml).
          SKIP: no-commit-to-branch,mypy,addon-lint
