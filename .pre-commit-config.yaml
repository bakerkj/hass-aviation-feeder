repos:
  - repo: builtin
    hooks:
      - id: no-commit-to-branch
        args: ["--branch", "main"]
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Python lint + format (matches the ~/github/ha-* house style). Covers every
  # tracked .py: the aviation_feeder_mqtt package, the build-time helpers
  # (assert-units.py, patch-mlat-client.py), CI scripts, and the unit tests.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        files: ^aviation_feeder/.*\.py$
        pass_filenames: false
        args: [aviation_feeder]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.3
    hooks:
      - id: codespell
        args: ["--ignore-words-list", "hass"]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.9.5
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown]
        args: ["--prose-wrap", "always"]
        language_version: system

  # Shell linting. Two things worth knowing:
  #
  # 1. MATCH BY PATH, NOT BY EXTENSION. `files: \.sh$` only ever saw 3 of our 36
  #    shell scripts: every s6-overlay script (cont-init.d/*, s6-rc.d/*/{run,up},
  #    scripts/*, the sourced /usr/local/bin/feeder-gate library) is extensionless,
  #    so the 31 scripts that actually run inside the container -- including the
  #    gate logic 16 feeders depend on -- were never linted at all.
  #    The exclude drops the non-shell s6 control files (type, contents.d/,
  #    dependencies.d/) and the stunnel config that live under the same tree.
  #
  # 2. STRICTER THAN THE DEFAULT. `-S style -o all` is well past the usual
  #    `-S warning`: it catches unquoted expansions (SC2086) and `A && B || C`
  #    misuse (SC2015), which sit BELOW the warning threshold and were therefore
  #    invisible. The five exclusions are deliberate, not convenience:
  #      SC1091 - can't follow sourced paths that only exist inside the image
  #      SC2312 - "command substitution masks a return value"; fires on nearly
  #               every $(...) in a string, for a failure mode we don't have
  #      SC2154 - "referenced but not assigned": LAT/LONG/ALT/*_API_KEY are
  #               injected at runtime by s6's with-contenv, which shellcheck
  #               structurally cannot see. All false positives.
  #      SC2310 - "function in an if condition disables set -e": every hit is a
  #               predicate we deliberately branch on. That IS the intent.
  #      SC2292 - "prefer [[ ]] over [ ]": several scripts are POSIX
  #               `#!/command/with-contenv sh`, where [[ ]] is not portable.
  #    Everything else is FIXED rather than suppressed; the tree is at zero.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^(scripts/.*\.sh|tests/.*\.sh|aviation_feeder/rootfs/.*)$
        exclude: (/type$|/contents\.d/|/dependencies\.d/|\.conf$)
        args:
          [
            "-S",
            "style",
            "-o",
            "all",
            "-e",
            "SC1091,SC2312,SC2154,SC2310,SC2292",
          ]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.0-1
    hooks:
      - id: shfmt
        files: ^(scripts/.*\.sh|tests/.*\.sh|aviation_feeder/rootfs/.*)$
        exclude: (/type$|/contents\.d/|/dependencies\.d/|\.conf$)
        args: ["-w", "-i", "2", "-ci"]

  - repo: https://github.com/AleksaC/hadolint-py
    rev: v2.14.0
    hooks:
      - id: hadolint
        args:
          - --ignore
          - DL3006
          - --ignore
          - DL3007
          - --ignore
          - DL3018

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.26.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional@21"]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-jsonschema
        name: Validate pre-commit config schema
        files: ^\.pre-commit-config\.yaml$
        args:
          - --schemafile
          - https://json.schemastore.org/pre-commit-config.json
      - id: check-jsonschema
        name: Validate commitlint config schema
        files: ^\.commitlintrc\.json$
        args:
          - --schemafile
          - https://json.schemastore.org/commitlintrc.json
      - id: check-github-workflows
      - id: check-renovate
      - id: check-jsonschema
        name: Validate Home Assistant add-on config schema
        files: ^[^/]+/config\.json$
        args:
          - --regex-variant
          - python
          - --schemafile
          - https://raw.githubusercontent.com/frenck/action-addon-linter/v2.21.0/src/config.schema.json
      - id: check-jsonschema
        name: Validate Home Assistant add-on build schema
        files: ^[^/]+/build\.ya?ml$
        args:
          - --regex-variant
          - python
          - --schemafile
          - https://raw.githubusercontent.com/frenck/action-addon-linter/v2.21.0/src/build.schema.json

  - repo: local
    hooks:
      - id: addon-lint
        name: HA addon lint
        entry: scripts/addon-lint.sh
        language: script
        files: ^[^/]+/config\.json$
        pass_filenames: true
