; stunnel TLS tunnel for sdrmap MLAT: mlat-client connects to the local accept
; socket, stunnel wraps it in TLS to sdrmap's MLAT server. Written by the add-on
; (the upstream image ships an equivalent /etc/stunnel/mlat.conf).
client = yes
foreground = yes

[mlat-client-sdrmap]
accept = 127.0.0.1:3333
connect = mlat.feed.sdrmap.org:3334
