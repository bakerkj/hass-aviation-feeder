      <stop offset="0" stop-color="#134074"/><stop offset="1" stop-color="#0B2545"/>
    </linearGradient>
    <linearGradient id="sweepg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#4CC9F0" stop-opacity="0.75"/>
